<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gun Comparison</title>
</head>
<body>

<style>
.gtable { width:100%; border-collapse:collapse; font-size:12px; }
.gtable th { font-weight:500; font-size:11px; color:var(--color-text-secondary); padding:6px 8px; border-bottom:0.5px solid var(--color-border-tertiary); text-align:center; }
.gtable td { padding:7px 8px; border-bottom:0.5px solid var(--color-border-tertiary); text-align:center; vertical-align:middle; color:var(--color-text-primary); }
.gtable tr:last-child td { border-bottom:none; }
.gun-label { font-weight:500; text-align:left !important; font-size:13px; }
.bar-wrap { background:var(--color-background-secondary); border-radius:3px; height:10px; width:100%; min-width:60px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
.tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
.tag-r6 { background:#E1F5EE; color:#085041; }
.tag-cod { background:#FAECE7; color:#712B13; }
.section-head td { background:var(--color-background-secondary); font-weight:500; font-size:11px; color:var(--color-text-secondary); padding:4px 8px; }
</style>

<div style="display:flex;gap:12px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
  <span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">枪系五维边界对比</span>
  <span class="tag tag-r6">R6 </span>
  <span class="tag tag-cod">COD21 </span>
  <span style="font-size:11px;color:var(--color-text-tertiary);margin-left:auto">数值为设计区间，非真实游戏数据,仅作参考</span>
</div>

<table class="gtable">
<thead>
<tr>
  <th style="text-align:left;width:60px">枪型</th>
  <th style="width:30px">游戏</th>
  <th>射程</th>
  <th>移动性</th>
  <th>操控性</th>
  <th>穿透</th>
  <th>破坏力</th>
</tr>
</thead>
<tbody>

<tr>
  <td class="gun-label" rowspan="2">AR</td>

  <td><div class="bar-wrap"><div class="bar-fill" style="width:52%;background:#1D9E75"></div></div></td>
  <td><div class="bar-wrap"><div class="bar-fill" style="width:40%;background:#1D9E75"></div></div></td>

<tr>

  <td><div class="bar-wrap"><div class="bar-fill" style="width:58%;background:#D85A30"></div></div></td>
</tr>
